name: taskati
description: A new Flutter project
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI
  flutter_svg: ^2.2.3
  gap: ^3.0.1
  google_fonts: ^8.0.2
  percent_indicator: ^4.2.5
  buttons_tabbar: ^1.3.15
  date_picker_timeline: ^1.2.7
  lottie: ^3.3.2

  # Utils
  intl: ^0.20.2
  image_picker: ^1.2.1
  shared_preferences: ^2.5.4

  # Hive CE Database
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generator
  build_runner: ^2.4.9
  hive_ce_generator: ^1.11.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/font/

  fonts:
    - family: LexendDeca
      fonts:
        - asset: assets/font/lexend-deca-latin-400-normal.ttf
          weight: 400
        - asset: assets/font/lexend-deca-latin-500-normal.ttf
          weight: 500
        - asset: assets/font/lexend-deca-latin-600-normal.ttf
          weight: 600
        - asset: assets/font/lexend-deca-latin-700-normal.ttf
          weight: 700